<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">

        <div class="card free">
            <div class="text"><h1>FREE</h1></div>
            <div class="price">
                <h1><sup>$</sup>0<sub>/ m</sub></h1>
                <p>Great for starters </p>
            </div>
            <div class="button"><p>GET STARTED</p></div>
            <ul>
                <li><svg width="64px" height="64px" viewBox="-7.92 -7.92 39.84 39.84" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#20fe23"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4.89163 13.2687L9.16582 17.5427L18.7085 8" stroke="#00ff33" stroke-width="1.128" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg></li>
                <li></li>
                <li></li>
            </ul>
        </div>

        <div class="card lite">
            <div class="text"><h1>LITE</h1></div>
            <div class="price">
                <h1><sup>$</sup>19<sub>/ m</sub></h1>
                <p>For Lite planner </p>
            </div>
            <div class="button"><p>GET STARTED</p></div>
        </div>

        <div class="card pro">
            <div class="text"><h1>PRO</h1></div>
            <div class="price">
                <h1><sup>$</sup>39<sub>/ m</sub></h1>
                <p>For Pro planner</p>
            </div>
            <div class="button"><p>GET STARTED</p></div>
        </div>

        <div class="card max">
            <div class="text"><h1>MAX</h1></div>
            <div class="price">
                <h1><sup>$</sup>69<sub>/ m</sub></h1>
                <p>For Legend planner </p>
            </div>
            <div class="button"><p>GET STARTED</p></div>
        </div>
    </div>
</body>
</html>
